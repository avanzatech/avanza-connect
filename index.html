<style>
  :root{
    --obsidian:#0a0a0f;--obsidian-2:#101018;--platinum:#eef0f6;--muted:#9aa0b4;--dim:#5c6178;
    --cyan:#4fd6ff;--violet:#a855f7;--gold:#C9A84C;--green:#22c55e;
    --line:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.03);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--obsidian);color:var(--platinum);font-family:"Inter",sans-serif;}
  body{min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;overflow-x:hidden;position:relative;}

  .field{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.45;animation:drift 24s ease-in-out infinite;}
  .orb.cyan{width:60vw;height:60vw;background:radial-gradient(circle,rgba(79,214,255,0.30),transparent 65%);top:-18vh;left:-20vw;}
  .orb.violet{width:55vw;height:55vw;background:radial-gradient(circle,rgba(168,85,247,0.28),transparent 65%);bottom:-12vh;right:-18vw;animation-delay:-9s;}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(4vw,5vh) scale(1.08);}}

  /* faint butterfly watermark behind hero */
  .butterfly{position:fixed;top:6vh;left:50%;transform:translateX(-58%);width:min(560px,120vw);opacity:0.05;z-index:0;pointer-events:none;filter:saturate(0.4);}

  .lang{position:fixed;top:calc(env(safe-area-inset-top) + 16px);right:16px;z-index:5;display:flex;gap:2px;padding:3px;border-radius:100px;border:1px solid var(--line);background:rgba(16,16,24,0.7);backdrop-filter:blur(10px);font-family:"JetBrains Mono",monospace;}
  .lang button{border:none;background:none;color:var(--dim);font-size:11px;font-weight:500;padding:5px 10px;border-radius:100px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;}
  .lang button.on{background:rgba(255,255,255,0.1);color:var(--platinum);}

  .wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:0 24px 56px;display:flex;flex-direction:column;align-items:center;text-align:center;}

  /* top brand logo */
  .brand{margin-top:calc(env(safe-area-inset-top) + 30px);height:44px;opacity:0;animation:fade .9s ease forwards .15s;}
  .brand img{height:100%;width:auto;}

  /* photo */
  .avatar{width:132px;height:132px;margin:40px auto 0;position:relative;opacity:0;animation:pop 1s cubic-bezier(.16,1,.3,1) forwards .4s;}
  .avatar .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,var(--cyan),var(--violet),var(--gold),var(--cyan));padding:2.5px;animation:spin 8s linear infinite;}
  .avatar .inner{position:absolute;inset:2.5px;border-radius:50%;background:var(--obsidian-2);overflow:hidden;}
  .avatar .inner img{width:100%;height:100%;object-fit:cover;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .name{margin-top:26px;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:38px;letter-spacing:-0.01em;line-height:1;opacity:0;animation:rise .8s ease forwards .6s;}
  .title{margin-top:12px;font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;background:linear-gradient(90deg,#c8ccd6,#f4f6fa,#aeb4c2);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:500;opacity:0;animation:rise .8s ease forwards .72s;}
  .company{margin-top:18px;display:inline-flex;align-items:center;gap:8px;padding:7px 15px;border-radius:100px;border:1px solid var(--line);background:var(--card);font-size:13px;color:var(--platinum);opacity:0;animation:rise .8s ease forwards .84s;}
  .company .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}

  .primary{margin-top:40px;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;border:none;border-radius:16px;background:linear-gradient(100deg,#e8eaf0,#c4c9d4 55%,#dfe2ea);color:#0a0a0f;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 12px 44px -14px rgba(220,225,235,.4);opacity:0;animation:rise .8s ease forwards .96s;transition:transform .15s ease;}
  .primary:active{transform:scale(.98);}
  .primary .sheen{position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);animation:sheen 3.4s ease-in-out infinite 1.6s;}
  @keyframes sheen{0%{left:-60%;}55%,100%{left:130%;}}
  .savehint{margin-top:12px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim);min-height:14px;opacity:0;animation:rise .8s ease forwards 1.04s;}

  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:26px;width:100%;opacity:0;animation:rise .8s ease forwards 1.12s;}
  .quick a{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 0;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--muted);text-decoration:none;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.04em;transition:border-color .2s,color .2s,transform .15s;}
  .quick a:active{transform:scale(.96);}
  .quick a:hover{border-color:rgba(220,225,235,.45);color:var(--platinum);}
  .quick svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6;}

  .install{margin-top:22px;width:100%;display:none;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;border:1px solid rgba(220,225,235,.22);background:rgba(220,225,235,.04);}
  .install.show{display:flex;}
  .install .ico{width:36px;height:36px;flex-shrink:0;border-radius:10px;overflow:hidden;}
  .install .ico img{width:100%;height:100%;object-fit:cover;}
  .install .txt{flex:1;text-align:left;}
  .install .txt b{font-size:13px;display:block;}
  .install .txt span{font-size:11px;color:var(--muted);}
  .install button{border:none;background:var(--platinum);color:#06060a;font-weight:600;font-size:12px;padding:9px 16px;border-radius:10px;cursor:pointer;}

  .footer{margin-top:44px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.12em;color:var(--dim);opacity:0;animation:rise .8s ease forwards 1.3s;}
  .footer .tap{color:var(--gold);}

  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{opacity:0;transform:scale(.82);}to{opacity:1;transform:scale(1);}}

  /* fail-safe: never blank */
  .brand,.avatar,.name,.title,.company,.primary,.savehint,.quick,.footer{opacity:1;}

  @media (min-width:620px){
    body{align-items:center;padding:48px 0;}
    .wrap{border:1px solid var(--line);border-radius:30px;background:rgba(16,16,24,0.5);backdrop-filter:blur(14px);box-shadow:0 50px 120px -40px rgba(0,0,0,0.85);padding:0 30px 44px;}
    .butterfly{position:absolute;}
    .lang{position:absolute;top:16px;right:16px;}
  }
  @media (prefers-reduced-motion:reduce){*,.orb,.avatar .ring,.primary .sheen{animation:none !important;}}
</style>
</head>

  document.getElementById("install-btn").addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById("install").classList.remove("show");});
  if(window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone){document.getElementById("install").classList.remove("show");}
  if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
</script>
</body>
