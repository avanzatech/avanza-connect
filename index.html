<style>
  :root{
    --bg:#08080b;--card-1:#141118;--card-2:#0d0b10;--platinum:#f2ede2;--muted:#9a927f;--dim:#655e50;
    --gold:#e7c884;--gold-2:#c9a25c;--gold-soft:#f0dcae;--green:#34d17a;
    --line:rgba(231,200,132,0.14);--glass:rgba(255,255,255,0.03);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--platinum);font-family:"Inter",sans-serif;}
  body{min-height:100vh;min-height:100dvh;display:flex;justify-content:center;align-items:center;overflow-x:hidden;position:relative;padding:20px 16px;}

  .ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .glow{position:absolute;border-radius:50%;filter:blur(100px);}
  .glow.g1{width:70vw;height:70vw;background:radial-gradient(circle,rgba(231,200,132,0.12),transparent 65%);top:-25vh;left:-15vw;}
  .glow.g2{width:60vw;height:60vw;background:radial-gradient(circle,rgba(120,90,180,0.10),transparent 65%);bottom:-20vh;right:-15vw;}

  /* THE CARD */
  .card{
    position:relative;z-index:1;width:100%;max-width:400px;
    border-radius:30px;padding:38px 26px 26px;overflow:hidden;
    background:linear-gradient(165deg,#16121b 0%,#0c0a0f 55%,#0a0810 100%);
    border:1px solid var(--line);
    box-shadow:0 0 0 1px rgba(231,200,132,0.06),0 40px 120px -30px rgba(0,0,0,0.9),inset 0 1px 0 rgba(255,255,255,0.04);
  }
  /* glowing gold edge */
  .card::before{content:"";position:absolute;inset:0;border-radius:30px;padding:1px;background:linear-gradient(150deg,rgba(231,200,132,0.5),transparent 30%,transparent 70%,rgba(201,162,92,0.4));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  /* corner dot grid (top-left) */
  .dots{position:absolute;top:22px;left:22px;width:90px;height:90px;opacity:0.5;pointer-events:none;background-image:radial-gradient(rgba(231,200,132,0.35) 1px,transparent 1px);background-size:11px 11px;-webkit-mask:linear-gradient(135deg,#000,transparent 70%);mask:linear-gradient(135deg,#000,transparent 70%);}
  /* corner arcs (top-right) */
  .arcs{position:absolute;top:-40px;right:-40px;width:200px;height:200px;opacity:0.4;pointer-events:none;}
  .arcs span{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(231,200,132,0.25);}
  .arcs span:nth-child(2){inset:22px;border-color:rgba(231,200,132,0.16);}
  .arcs span:nth-child(3){inset:44px;border-color:rgba(231,200,132,0.1);}
  /* faint butterfly */
  .bf{position:absolute;bottom:8%;left:-6%;width:70%;opacity:0.04;pointer-events:none;filter:saturate(0.3);}

  .lang{position:absolute;top:16px;right:16px;z-index:5;display:flex;gap:2px;padding:3px;border-radius:100px;border:1px solid var(--line);background:rgba(10,8,14,0.7);backdrop-filter:blur(10px);font-family:"JetBrains Mono",monospace;}
  .lang button{border:none;background:none;color:var(--dim);font-size:11px;font-weight:500;padding:5px 10px;border-radius:100px;cursor:pointer;font-family:inherit;letter-spacing:0.05em;}
  .lang button.on{background:rgba(231,200,132,0.16);color:var(--gold);}

  .inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;}

  .brand{height:64px;margin-bottom:8px;opacity:0;animation:fade .9s ease forwards .15s;}
  .brand img{height:100%;width:auto;filter:drop-shadow(0 2px 12px rgba(231,200,132,0.25));}

  .avatar{width:168px;height:168px;margin-top:14px;position:relative;opacity:0;animation:pop 1s cubic-bezier(.16,1,.3,1) forwards .4s;}
  .avatar .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 210deg,#e7c884,#a855f7,#4fd6ff,#e7c884);padding:3px;animation:spin 9s linear infinite;}
  .avatar .inner-a{position:absolute;inset:3px;border-radius:50%;background:var(--bg);overflow:hidden;}
  .avatar .inner-a img{width:100%;height:100%;object-fit:cover;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .name{margin-top:24px;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:46px;line-height:1;letter-spacing:-0.02em;background:linear-gradient(180deg,#f6e8c8,#e7c884 60%,#c9a25c);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:rise .8s ease forwards .6s;}
  .title{margin-top:14px;font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:0.26em;text-transform:uppercase;color:var(--platinum);font-weight:500;opacity:0;animation:rise .8s ease forwards .72s;}
  .company{margin-top:20px;display:inline-flex;align-items:center;gap:9px;padding:8px 16px;border-radius:100px;border:1px solid var(--line);background:var(--glass);font-size:14px;color:var(--platinum);opacity:0;animation:rise .8s ease forwards .84s;}
  .company .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green);}

  .primary{margin-top:34px;display:flex;align-items:center;justify-content:center;gap:11px;width:100%;padding:19px;border:none;border-radius:16px;background:linear-gradient(100deg,#f0dcae,#e7c884 50%,#d4af6a);color:#1a1206;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:17px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 14px 44px -12px rgba(231,200,132,.5),inset 0 1px 0 rgba(255,255,255,.4);opacity:0;animation:rise .8s ease forwards .96s;transition:transform .15s ease;}
  .primary:active{transform:scale(.98);}
  .primary .sheen{position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.6),transparent);animation:sheen 3.6s ease-in-out infinite 1.6s;}
  @keyframes sheen{0%{left:-60%;}55%,100%{left:130%;}}
  .savehint{margin-top:14px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim);min-height:14px;opacity:0;animation:rise .8s ease forwards 1.04s;}

  .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:24px;width:100%;opacity:0;animation:rise .8s ease forwards 1.12s;}
  .quick a{display:flex;flex-direction:column;align-items:center;gap:9px;padding:16px 0;border-radius:15px;border:1px solid var(--line);background:var(--glass);color:var(--muted);text-decoration:none;font-family:"Inter",sans-serif;font-size:11px;font-weight:500;transition:border-color .2s,color .2s,transform .15s;}
  .quick a:active{transform:scale(.96);}
  .quick a:hover{border-color:rgba(231,200,132,.4);color:var(--platinum);}
  .quick svg{width:22px;height:22px;stroke:var(--gold);fill:none;stroke-width:1.6;}

  .install{margin-top:22px;width:100%;display:none;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;border:1px solid var(--line);background:var(--glass);}
  .install.show{display:flex;}
  .install .ico{width:44px;height:44px;flex-shrink:0;border-radius:11px;overflow:hidden;}
  .install .ico img{width:100%;height:100%;object-fit:cover;}
  .install .txt{flex:1;text-align:left;}
  .install .txt b{font-size:14px;display:block;color:var(--platinum);}
  .install .txt span{font-size:12px;color:var(--muted);}
  .install button{border:none;background:linear-gradient(100deg,#f0dcae,#e7c884);color:#1a1206;font-weight:600;font-size:13px;width:52px;height:44px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .install button svg{width:20px;height:20px;stroke:#1a1206;fill:none;stroke-width:2;}

  .footer{margin-top:28px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.12em;color:var(--dim);opacity:0;animation:rise .8s ease forwards 1.3s;}
  .footer .tap{color:var(--gold);}

  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{opacity:0;transform:scale(.82);}to{opacity:1;transform:scale(1);}}
  .brand,.avatar,.name,.title,.company,.primary,.savehint,.quick,.footer{opacity:1;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;}}
</style>
</head>

  function render(){const d=I18N[lang];document.documentElement.lang=lang;document.querySelectorAll("[data-t]").forEach(el=>{const k=el.getAttribute("data-t");if(d[k]!=null)el.textContent=d[k];});document.getElementById("lang-en").classList.toggle("on",lang==="en");document.getElementById("lang-es").classList.toggle("on",lang==="es");}

  document.getElementById("q-mail").href="mailto:"+PROFILE.email;

  document.getElementById("q-web").href=PROFILE.website;
  let PHOTO_B64="";fetch("./vcard-photo.b64").then(r=>r.text()).then(t=>{PHOTO_B64=t.trim();}).catch(()=>{});
  function buildVCard(){const l=["BEGIN:VCARD","VERSION:3.0","N:"+PROFILE.lastName+";"+PROFILE.firstName+";;;","FN:"+PROFILE.firstName+(PROFILE.lastName?" "+PROFILE.lastName:""),"ORG:"+PROFILE.org,"TITLE:"+PROFILE.title,"TEL;TYPE=CELL:"+PROFILE.phone,"EMAIL;TYPE=WORK:"+PROFILE.email,"URL:"+PROFILE.website];if(PHOTO_B64)l.push("PHOTO;ENCODING=b;TYPE=JPEG:"+PHOTO_B64);l.push("END:VCARD");return l.join("\r\n");}
  document.getElementById("save").addEventListener("click",()=>{const blob=new Blob([buildVCard()],{type:"text/vcard;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Ali-Avanza.vcf";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1500);const n=document.getElementById("note");n.textContent=I18N[lang].opening;n.style.color="#e7c884";if(navigator.vibrate)navigator.vibrate(12);});

  document.getElementById("install-btn").addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById("install").classList.remove("show");});
  if(window.matchMedia("(display-mode: standalone)").matches||window.navigator.standalone){document.getElementById("install").classList.remove("show");}
  if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
</script>
</body>
